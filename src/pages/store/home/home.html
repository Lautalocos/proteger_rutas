<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Food Store — Catálogo</title>
        <link rel="stylesheet" href="./home.css" />
    </head>
    <body>

        <header>
            <div class="logo">Food<span>Store</span></div>
            <div class="header-actions">
                <a href="../cart/cart.html" class="cart-btn">
                    🛒 Carrito
                    <span id="cart-count"></span>
                </a>
                <button id="logoutButton" class="logout-btn">Cerrar sesión</button>
            </div>
        </header>

        <div class="layout">

            <!-- Sidebar con categorías — se rellena desde home.ts -->
            <aside>
                <h2>Categorías</h2>
                <div id="categories-list"></div>
            </aside>

            <main>
                <!-- Buscador -->
                <input
                    type="text"
                    id="search-input"
                    placeholder="🔍 Buscar productos..."
                    autocomplete="off"
                />

                <!-- Grilla de productos — se rellena desde home.ts -->
                <div class="products-grid" id="products-grid"></div>

                <!-- Footer -->
                <footer>
                    <small>
                        2026 Food Store. Todos los derechos reservados. <br />
                        Contacto: <a href="mailto:FoodStore@FoodStore.com">FoodStore@FoodStore.com</a>
                    </small>
                </footer>
            </main>

        </div>

        <!-- Notificación al agregar al carrito — controlada desde home.ts -->
        <div id="toast">✓ Producto agregado al carrito</div>

        <script type="module" src="./home.ts"></script>
    </body>
</html>
