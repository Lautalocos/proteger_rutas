<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login de Food Store</title>
    <link rel="stylesheet" href="./login.css" />
</head>
<body>
    <h1>Food Store</h1>

    <form id="formularioLogin">
        <h1>Iniciar Sesión</h1>
        <div>
            <label for="inputEmail">Email</label>
            <input type="email" id="inputEmail" name="email" autocomplete="off" placeholder="ejemplo@correo.com" required>
        </div>
        <div>
            <label for="inputPassword">Contraseña</label>
            <input type="password" id="inputPassword" name="password" autocomplete="off" placeholder="********" required>
        </div>
        

        <button type="submit">Ingresar</button>
        <button type="button" id="botonRegistro">Registrarse</button>
    </form>

    <script type="module" src="./login.ts"></script>
</body>
</html>
